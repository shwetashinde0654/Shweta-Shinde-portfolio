<!DOCTYPE html>
<html>
<head>
<title>Fur Families</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color:#f7efe5;
    margin:0;
    padding:0;
}

header{
    text-align:center;
    background:#d8b4a0;
    padding:25px;
    color:white;
    font-size:40px;
    font-weight:bold;
}


.back-btn{
    display:block;
    width:100px;
    margin:15px auto;
    padding:8px;
    background:#b08968;
    color:white;
    text-decoration:none;
    text-align:center;
    border-radius:8px;
}

.container{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:25px;
    padding:40px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    text-align:center;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:200px;
    border-radius:10px;
}

.breed{
    font-size:22px;
    margin-top:15px;
    font-weight:bold;
}

.desc{
    font-size:14px;
    margin-top:10px;
    color:#555;
}
</style>
</head>

<body>

<header>Fur Families</header>

<a href="index.html" class="back-btn">⬅ Back</a>

<div class="container">

<div class="card">
<img src="https://www.trupanion.com/images/trupanionwebsitelibraries/pet-blogs/persian-cat-in-yard-1-.jpg?sfvrsn=5e255eb2_4">
<div class="breed">Persian Cat</div>
<div class="desc">
Calm, fluffy and gentle.<br>
Lifespan: 12–17 years<br>
Care: Daily brushing required.
</div>
</div>

<div class="card">
<img src="https://images.pexels.com/photos/4383733/pexels-photo-4383733.png">
<div class="breed">Siamese Cat</div>
<div class="desc">
Intelligent and vocal.<br>
Lifespan: 12–20 years<br>
Care: Needs play & interaction.
</div>
</div>

<div class="card">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSxP43gOe6Tc6Akxc26yuY73FtZykvIdGY6Xg&s">
<div class="breed">Maine Coon</div>
<div class="desc">
Friendly gentle giant.<br>
Lifespan: 10–15 years<br>
Care: Weekly grooming.
</div>


<style>

</style>
</div>

</body>
</html>
